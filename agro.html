<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drone Agro Pro: Formação de Elite | Jamerson Cunha</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="logo_agro.png">
    
    <!-- Social Sharing Meta Tags -->
    <meta property="og:title" content="Drone Agro Pro | Jamerson Cunha">
    <meta property="og:description" content="Especialize-se na operação de drones agrícolas com a trilha de elite do Jamerson Cunha.">
    <meta property="og:image" content="logo_agro.png">
    <meta property="og:type" content="website">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #22c55e;
            --primary-glow: rgba(34, 197, 94, 0.6);
            --accent-yellow: #facc15;
            --agro-black: #020617;
            --white: #ffffff;
            --bg-dark: #020617;
            --bg-glass: rgba(255, 255, 255, 0.95);
            --text-main: #0f172a;
            --text-muted: #475569;
            --sidebar-width: 340px;
            --transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @media (min-width: 1301px) {
            :root { --sidebar-width: 400px; }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Sora', sans-serif;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        body {
            background-color: #f8fafc;
            color: var(--text-main);
            line-height: 1.8;
            overflow-x: hidden;
        }

        /* Animations */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .reveal-up {
            animation: fadeInUp 0.8s var(--transition) forwards;
        }

        /* Mobile Navigation Toggle */
        .mobile-header {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(2, 6, 23, 0.95);
            backdrop-filter: blur(15px);
            color: white;
            z-index: 2000;
            padding: 0 1.5rem;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 20px rgba(0,0,0,0.3);
        }

        .menu-toggle {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            background: rgba(255,255,255,0.05);
            transition: var(--transition);
        }
        .menu-toggle:active { transform: scale(0.9); }

        /* Sidebar Architecture */
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: var(--sidebar-width);
            background: linear-gradient(180deg, #064e3b 0%, #022c22 100%);
            color: white;
            display: flex;
            flex-direction: column;
            z-index: 2100;
            box-shadow: 10px 0 50px rgba(0,0,0,0.3);
            transition: var(--transition);
        }

        .sidebar-brand {
            padding: 3rem 2.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .brand-title {
            font-weight: 900;
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            color: var(--primary);
            letter-spacing: -2px;
            line-height: 0.9;
            text-shadow: 0 0 30px var(--primary-glow);
            text-transform: uppercase;
        }

        .brand-sub {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: rgba(255,255,255,0.5);
            font-weight: 800;
        }

        .instructor-branding {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255,255,255,0.1);
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--accent-yellow);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .progress-box {
            margin: 2rem;
            padding: 1.5rem;
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(5px);
        }

        .progress-bar-outer {
            background: rgba(255,255,255,0.1);
            height: 8px;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 1rem;
        }

        .progress-bar-inner {
            background: linear-gradient(90deg, var(--primary) 0%, #34d399 100%);
            height: 100%;
            width: 0%;
            transition: width 1s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .progress-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            font-weight: 800;
            color: rgba(255,255,255,0.5);
            letter-spacing: 0.1em;
        }

        .nav-list {
            flex: 1;
            overflow-y: auto;
            padding: 1rem 0;
        }

        .nav-item {
            padding: 1.25rem 2.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            transition: var(--transition);
            border-left: 6px solid transparent;
            opacity: 0.7;
        }

        .nav-item:hover { 
            background: rgba(255,255,255,0.03); 
            opacity: 1;
            padding-left: 3rem;
        }
        
        .nav-item.active {
            background: rgba(16, 185, 129, 0.1);
            border-left-color: var(--primary);
            opacity: 1;
        }

        .nav-num {
            font-size: 0.7rem;
            font-weight: 900;
            background: rgba(255,255,255,0.05);
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            color: var(--text-muted);
            transition: var(--transition);
        }

        .active .nav-num { 
            background: var(--primary); 
            color: white; 
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .nav-content { flex: 1; }
        .nav-title { font-size: 0.95rem; font-weight: 600; color: white; }

        /* Main Workspace */
        .main-workspace {
            margin-left: var(--sidebar-width);
            min-height: 100vh;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            transition: var(--transition);
        }

        @media (max-width: 1300px) {
            .main-workspace { margin-left: 0; padding-top: 70px; }
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .mobile-header { display: flex; }
        }

        .hero-banner {
            padding: clamp(3rem, 8vh, 6rem) clamp(1.5rem, 5vw, 6rem);
            background: white;
            border-bottom: 1px solid #e2e8f0;
            position: relative;
            overflow: hidden;
        }

        .hero-banner::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
            z-index: 0;
            pointer-events: none;
        }

        .hero-banner h1 {
            font-size: clamp(2.5rem, 8vw, 4.2rem);
            font-weight: 900;
            letter-spacing: -3px;
            margin-bottom: 1.5rem;
            color: var(--bg-dark);
            line-height: 1;
            position: relative;
            z-index: 1;
            text-transform: uppercase;
        }

        .hero-desc {
            font-size: clamp(1.2rem, 3vw, 1.6rem);
            color: var(--text-muted);
            max-width: 900px;
            line-height: 1.4;
            position: relative;
            z-index: 1;
            font-weight: 500;
        }

        .content-body {
            padding: clamp(1.5rem, 5vw, 5rem);
            max-width: 1200px;
            margin: 0 auto;
            flex: 1;
            width: 100%;
        }

        .media-frame {
            margin-bottom: 4rem;
            border-radius: clamp(20px, 4vw, 40px);
            overflow: hidden;
            box-shadow: 0 40px 100px rgba(15, 23, 42, 0.12);
            border: 1px solid #e2e8f0;
            background: white;
            position: relative;
        }

        .media-frame img { width: 100%; display: block; height: auto; transition: transform 0.8s ease; }
        .media-frame:hover img { transform: scale(1.03); }

        section { margin-bottom: 4rem; }

        .section-tag {
            font-size: 0.75rem;
            font-weight: 900;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.25em;
            margin-bottom: 1rem;
            display: block;
        }

        .section-title {
            font-size: clamp(1.6rem, 4vw, 2.4rem);
            font-weight: 800;
            color: var(--bg-dark);
            margin-bottom: 2rem;
            letter-spacing: -1px;
        }

        .rich-text {
            font-size: clamp(1rem, 2vw, 1.15rem);
            color: #475569;
            margin-bottom: 2.5rem;
            line-height: 1.8;
        }

        /* Specialized Panels */
        .panel {
            padding: clamp(1.5rem, 4vw, 3rem);
            border-radius: 24px;
            margin-bottom: 4rem;
            border: 1px solid transparent;
            position: relative;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        }

        .panel-instructor { background: #f0fdf4; border-color: #bbf7d0; }
        .panel-legal { background: #eff6ff; border-color: #bfdbfe; }
        .panel-agro { background: #fdfce8; border-color: #fef08a; }
        .panel-danger { background: #fef2f2; border-color: #fecaca; }

        .panel-label {
            position: absolute;
            top: -15px;
            left: 25px;
            padding: 0.5rem 1.5rem;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        /* Data Visualization */
        .agro-stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 4rem;
        }

        .stat-card {
            background: white;
            border: 1px solid #e2e8f0;
            padding: 2rem 1.5rem;
            border-radius: 20px;
            text-align: center;
            transition: var(--transition);
        }
        .stat-card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 20px 40px rgba(0,0,0,0.05); }

        .stat-val {
            font-size: clamp(2rem, 5vw, 2.8rem);
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 0.25rem;
        }

        .stat-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        /* Checklists */
        .agro-check-list { 
            list-style: none; 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 1rem; 
        }
        .agro-check-item {
            padding: 1.25rem;
            background: white;
            border-radius: 16px;
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            font-weight: 600;
            font-size: 0.95rem;
            border: 1px solid #e2e8f0;
            transition: var(--transition);
        }
        .agro-check-item:hover { border-color: var(--primary); transform: translateX(5px); }
        .agro-check-item::before {
            content: '✓';
            font-size: 0.9rem;
            flex-shrink: 0;
            width: 24px;
            height: 24px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 2px;
        }

        /* Table */
        .data-table-wrapper {
            overflow-x: auto;
            margin-bottom: 4rem;
            border-radius: 20px;
            border: 1px solid #e2e8f0;
            background: white;
        }

        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: #f8fafc; padding: 1.25rem; text-align: left; font-weight: 800; font-size: 0.85rem; border-bottom: 1px solid #e2e8f0; color: var(--text-muted); text-transform: uppercase; }
        td { padding: 1.25rem; border-bottom: 1px solid #f1f5f9; font-size: 1rem; color: var(--text-main); }

        /* Footer */
        .workspace-footer {
            padding: 2rem clamp(1.5rem, 5vw, 6rem);
            background: white;
            border-top: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            position: sticky;
            bottom: 0;
            z-index: 100;
        }

        .nav-btn {
            padding: 1rem 2rem;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            flex: 1;
            max-width: 250px;
        }

        .btn-prev { background: #f1f5f9; color: #475569; }
        .btn-prev:hover { background: #e2e8f0; }
        .btn-next { background: var(--bg-dark); color: white; }
        .btn-next:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(15, 23, 42, 0.2); }

        /* Floating AI Chat Widget */
        .chat-widget {
            position: fixed;
            right: clamp(20px, 5vw, 40px);
            bottom: clamp(20px, 5vw, 40px);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .chat-button {
            width: clamp(60px, 15vw, 70px);
            height: clamp(60px, 15vw, 70px);
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 15px 40px rgba(16, 185, 129, 0.4);
            transition: var(--transition);
            color: white;
            font-size: 1.75rem;
            border: none;
        }

        .chat-window {
            width: clamp(300px, 90vw, 380px);
            height: clamp(450px, 70vh, 550px);
            background: white;
            border-radius: 30px;
            box-shadow: 0 30px 100px rgba(0,0,0,0.2);
            margin-bottom: 20px;
            display: none;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid #f1f5f9;
            animation: slideUp 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .chat-header {
            padding: 1.25rem 1.75rem;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .chat-header .bot-avatar {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
        }

        .chat-header .bot-info h4 { font-size: 0.95rem; font-weight: 800; }
        .chat-header .bot-info p { font-size: 0.7rem; opacity: 0.8; }

        .chat-messages {
            flex: 1;
            padding: 1.25rem;
            overflow-y: auto;
            background: #fdfdfd;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            max-width: 85%;
            padding: 0.85rem 1.1rem;
            border-radius: 18px;
            font-size: 0.9rem;
            line-height: 1.4;
            position: relative;
        }

        .message-bot {
            align-self: flex-start;
            background: #f1f5f9;
            color: var(--text-main);
            border-bottom-left-radius: 5px;
        }

        .message-user {
            align-self: flex-end;
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 5px;
        }

        .chat-input-area {
            padding: 1rem;
            background: white;
            border-top: 1px solid #f1f5f9;
            display: flex;
            gap: 0.5rem;
        }

        .chat-input {
            flex: 1;
            padding: 0.75rem 1.1rem;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            font-size: 0.9rem;
            outline: none;
            transition: var(--transition);
        }

        .chat-send {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
            z-index: 900;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- Mobile Header -->
    <div class="mobile-header">
        <div class="brand-title" style="font-size: 1.2rem; margin-bottom: 0;">🚁 DRONE AGRO</div>
        <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
    </div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <div class="brand-sub">Trilha de Especialização</div>
            <div class="brand-title">🌿 DRONE AGRO</div>
            <div class="instructor-branding">
                <span>By Jamerson Cunha</span>
                <span style="font-size: 1rem;">⚡</span>
            </div>
        </div>
        
        <div class="progress-box">
            <div class="progress-bar-outer">
                <div class="progress-bar-inner" id="progressBar"></div>
            </div>
            <div class="progress-meta">
                <span>CONFORMIDADE DO ESPECIALISTA</span>

        <nav class="nav-list" id="moduleNav">

        </nav>

        <div class="sidebar-footer">

                🚪 Sair da Conta
            </button>
            <a href="index.html" class="nav-btn btn-next" style="width: 100%; max-width: none; border-radius: 0; text-decoration: none; text-align: center;">
                🏠 Voltar ao Início
            </a>
        </div>
    </aside>

    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <!-- Main Content -->
    <main class="main-workspace">
        <header class="hero-banner" id="moduleHeader">

        </header>

        <div class="content-body" id="moduleContent">
            <!-- JS Inject -->
        </div>

        <footer class="workspace-footer">

    <!-- AI Chat Widget -->

                <div class="bot-info">
                    <h4>AgroBot IA</h4>
                    <p>Tutor Especialista em Drones</p>

            </div>
            <div class="chat-messages" id="chatMessages">
                <div class="message message-bot">
                    Olá! Sou o AgroBot. Tenho todo o conhecimento sobre legislação de drones e tecnologias agrícolas. Como posso te ajudar hoje?

            <div class="chat-input-area">

    <script>
        const modules = [
            {

        let currentModuleIndex = 0;
        let completedModules = new Set();

        function init() {
            renderNav();
            updateModule();
        }

        function renderNav() {
            const nav = document.getElementById('moduleNav');
            nav.innerHTML = modules.map((m, index) => {
                const isCompleted = completedModules.has(index);
                const isActive = index === currentModuleIndex;
                return `
                    <div class="nav-item ${isActive ? 'active' : ''} ${isCompleted ? 'completed' : ''}" onclick="changeModule(${index})">
                        <div class="nav-num">${index + 1}</div>
                        <div class="nav-content">
                            <div class="nav-title">${m.title}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateModule() {
            const m = modules[currentModuleIndex];
            const contentArea = document.getElementById('moduleContent');
            const headerArea = document.getElementById('moduleHeader');

            contentArea.style.opacity = '0';
            headerArea.style.opacity = '0';

            setTimeout(() => {
                headerArea.innerHTML = `<div class="reveal-up"><h1>${m.title}</h1><p class="hero-desc">${m.description}</p></div>`;
                
                let mediaHtml = `<div class="media-frame reveal-up">`;
                if (m.video) {
                    mediaHtml += `<div class="video-container" style="position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; max-width: 100%; border-radius: 20px;">
                                    <iframe style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;" src="${m.video}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                                  </div>`;
                } else {
                    mediaHtml += `<img src="${m.image}" alt="${m.title}">`;
                }
                mediaHtml += `</div>`;

                contentArea.innerHTML = mediaHtml + m.content;
                
                contentArea.style.opacity = '1';
                headerArea.style.opacity = '1';

                document.getElementById('btnPrev').disabled = currentModuleIndex === 0;
                document.getElementById('btnNext').innerText = currentModuleIndex === modules.length - 1 ? 'Finalizar Certificação Agro' : 'Próximo Módulo';
                
                window.scrollTo({ top: 0, behavior: 'smooth' });
                updateProgress();
                renderNav();
            }, 300);
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.querySelector('.sidebar-overlay');
            sidebar.classList.toggle('open');
            overlay.style.display = sidebar.classList.contains('open') ? 'block' : 'none';
        }

        function changeModule(index) {
            if (index < 0) return;
            if (index >= modules.length) {
                completedModules.add(currentModuleIndex);
                updateProgress();
                renderNav();
                alert("CERTIFICAÇÃO AGRO CONCLUÍDA! Você agora é um especialista de elite pela Facility Air.");
                return;
            }
            if (index > currentModuleIndex) completedModules.add(currentModuleIndex);
            currentModuleIndex = index;
            updateModule();
            
            if (window.innerWidth <= 1300) {
                const sidebar = document.getElementById('sidebar');
                const overlay = document.querySelector('.sidebar-overlay');
                sidebar.classList.remove('open');
                overlay.style.display = 'none';
            }
        }

        function updateProgress() {
            const percent = Math.round((completedModules.size / modules.length) * 100);
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('progressPercent').innerText = percent + '%';
        }

        function toggleChat() {
            const win = document.getElementById('chatWindow');
            win.style.display = win.style.display === 'flex' ? 'none' : 'flex';
        }

        function sendMessage() {
            const input = document.getElementById('chatInput');
            const msg = input.value.trim();
            if (!msg) return;

            const container = document.getElementById('chatMessages');
            const userDiv = document.createElement('div');
            userDiv.className = 'message message-user';
            userDiv.innerText = msg;
            container.appendChild(userDiv);
            input.value = '';

            setTimeout(() => {
                const botDiv = document.createElement('div');
                botDiv.className = 'message message-bot';
                botDiv.innerText = "Excelente pergunta! Como especialista da Facility Air, posso te confirmar que o uso de drones no agronegócio pode gerar uma economia de até 80% em insumos. Além disso, o ROI é extremamente rápido devido à eliminação do amassamento da cultura. Como posso te ajudar com mais detalhes técnicos sobre os sensores ou a pulverização?";
                container.appendChild(botDiv);
                container.scrollTop = container.scrollHeight;
            }, 1000);
        }

        function checkAuth() {
            const user = localStorage.getItem('agroUser');
            if (!user) {
                window.location.href = 'index.html';
            }
        }

        function logout() {
            localStorage.removeItem('agroUser');
            window.location.href = 'index.html';
        }

        window.onload = checkAuth;
        init();
    </script>
